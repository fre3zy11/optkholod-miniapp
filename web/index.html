<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ОптХолод — Mini App</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="row small-row">
        <button class="pill" id="langBtn" type="button">RU</button>
        <div class="brand-logo" aria-label="ОптХолод">
          <svg class="brand-mark" viewBox="0 0 120 82" role="img" aria-hidden="true">
            <path class="shield" d="M60 5 105 18v26c0 22-17 33-45 34C32 77 15 66 15 44V18L60 5Z"/>
            <path class="ice" d="M22 54h76"/>
            <path class="bear" d="M37 45c2-14 13-24 29-24 10 0 20 5 23 15 2 8-2 15-10 17l-4-7c3-1 5-4 4-8-2-5-8-8-15-8-10 0-18 6-20 16h8l-5 10H33l4-11Z"/>
            <circle class="eye" cx="70" cy="33" r="2"/>
          </svg>
          <div class="brand-text">ОПТХОЛОД</div>
          <div class="brand-sub">ЗАМОРОЖЕННЫЕ ПРОДУКТЫ</div>
        </div>
        <button class="pill" id="currencyBtn" type="button">RUB</button>
      </div>
      <div class="search-wrap">
        <span>⌕</span>
        <input id="search" placeholder="Поиск товаров" />
        <button id="favBtn" class="heart">♡</button>
      </div>
    </header>


    <main class="content">
      <div class="section-title">
        <h2 id="pageTitle">Новинки</h2>
        <button id="showAll">Смотреть все ›</button>
      </div>
      <div class="grid" id="products"></div>
    </main>

    <footer class="bottom-nav">
      <button class="nav active" data-tab="new">✦<span>Новинки</span></button>
      <button class="nav" data-tab="catalog">▦<span>Каталог</span></button>
      <button class="nav" data-tab="fav">♡<span>Избранное</span></button>
      <button class="nav" data-tab="cart">🛒<span>Корзина</span><b id="cartCount">0</b></button>
    </footer>
  </div>

  <div class="sheet" id="cartSheet">
    <div class="sheet-box">
      <div class="sheet-head">
        <h3 id="cartTitle">Корзина</h3>
        <button id="closeCart">×</button>
      </div>
      <div id="cartItems"></div>
      <div class="total"><span id="totalLabel">Итого:</span> <b id="total">0 ₽</b></div>
      <button class="checkout" id="checkout">Оформить заказ</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
