<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ОптХолод — Mini App</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="row small-row">
        <button class="pill" id="langBtn" type="button">RU</button>
        <img src="assets/logo.png" class="logo" alt="ОптХолод" />
        <button class="pill" id="currencyBtn" type="button">RUB</button>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search" placeholder="Поиск товаров" />
        <button id="favBtn" class="heart" type="button">♡</button>
      </div>
    </header>

    <section class="hero" id="hero">
      <h1>Ассортимент</h1>
      <p>Замороженные продукты питания оптом с доставкой по всей России</p>
    </section>

    <nav class="chips" id="categories"></nav>

    <main class="content">
      <div class="section-title">
        <h2 id="pageTitle">Новинки</h2>
        <button id="showAll" type="button">Смотреть все ›</button>
      </div>

      <div id="view"></div>
    </main>

    <footer class="bottom-nav">
      <button class="nav active" data-tab="new" type="button">
        <span class="nav-ico">✦</span>
        <span class="nav-text">Новинки</span>
      </button>
      <button class="nav" data-tab="catalog" type="button">
        <span class="nav-ico">▦</span>
        <span class="nav-text">Каталог</span>
      </button>
      <button class="nav" data-tab="fav" type="button">
        <span class="nav-ico">♡</span>
        <span class="nav-text">Избранное</span>
      </button>
      <button class="nav" data-tab="cart" type="button">
        <span class="nav-ico">🛒</span>
        <span class="nav-text">Корзина</span>
        <b id="cartCount">0</b>
      </button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
