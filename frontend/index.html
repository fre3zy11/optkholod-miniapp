<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ОптХолод — магазин</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <svg class="ice-filters" aria-hidden="true">
    <defs>
      <filter id="frostNoise" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" seed="14" result="noise" />
        <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
        <feComponentTransfer in="mono"><feFuncA type="table" tableValues="0 .16" /></feComponentTransfer>
      </filter>
      <linearGradient id="iceSheen" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#e9fbff" stop-opacity=".8" />
        <stop offset=".45" stop-color="#70d7ff" stop-opacity=".12" />
        <stop offset="1" stop-color="#e4f9ff" stop-opacity=".48" />
      </linearGradient>
    </defs>
  </svg>
  <div class="app">
    <canvas id="snowCanvas" class="snow-canvas" aria-hidden="true"></canvas>
    <div class="ambient-glow glow-one" aria-hidden="true"></div>
    <div class="ambient-glow glow-two" aria-hidden="true"></div>
    <header class="top">
      <div class="frost-edge" aria-hidden="true"></div>
      <div class="row small-row">
        <button class="pill" id="langBtn" type="button">RU</button>
        <div class="brand-logo" aria-label="ОптХолод">
          <canvas id="brandRive" class="brand-rive" aria-hidden="true"></canvas>
          <img class="brand-img" src="assets/optkholod_logo_new.png" alt="ОптХолод">
          <span class="brand-halo" aria-hidden="true"></span>
        </div>
        <div class="top-spacer" aria-hidden="true"></div>
      </div>
      <div class="search-wrap">
        <span>⌕</span>
        <input id="search" placeholder="Поиск товаров" />
        <button id="favBtn" class="heart">♡</button>
      </div>
      <div class="country-chips" aria-label="Страна производства">
        <button class="country-chip active" data-country-filter="" type="button">Все товары</button>
        <button class="country-chip" data-country-filter="Европа" type="button">🇪🇺 Европа</button>
        <button class="country-chip" data-country-filter="Китай" type="button">🇨🇳 Китай</button>
        <button class="country-chip" data-country-filter="Россия" type="button">🇷🇺 Россия</button>
      </div>
    </header>


    <main class="content">
      <div class="section-title">
        <h2 id="pageTitle">Новинки</h2>
      </div>
      <div class="grid" id="products"></div>
    </main>

    <footer class="bottom-nav">
      <button class="nav active" data-tab="new">✦<span>Новинки</span></button>
      <button class="nav" data-tab="catalog">▦<span>Каталог</span></button>
      <button class="nav" data-tab="fav">♡<span>Избранное</span></button>
      <button class="nav" data-tab="cart">🛒<span>Корзина</span><b id="cartCount">0</b></button>
    </footer>
  </div>

  <div class="sheet" id="cartSheet">
    <div class="sheet-box">
      <div class="sheet-head">
        <h3 id="cartTitle">Корзина</h3>
        <button id="closeCart">×</button>
      </div>
      <div id="cartItems"></div>
      <div class="total"><span id="totalLabel">Итого:</span> <b id="total">0 ₽</b></div>
      <button class="checkout" id="checkout">Оформить заказ</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
